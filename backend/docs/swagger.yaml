      - application/json
      description: Recall a sent message
      parameters:
      - description: Bearer Token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 消息ID
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/model.IDReq'
      produces:
      - application/json
      responses:
        "201":
          description: 撤回成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: json解析出错
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 撤回消息
      tags:
      - message
  /auth/messages/text:
    post:
      consumes:
      - application/json
